<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- PWA -->
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="衣见" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="衣见" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-TileColor" content="#0f172a" />
    <meta name="description" content="每天穿什么？让AI帮你搭配，发现被遗忘的好东西" />

    <!-- Icons -->
    <link rel="manifest" href="./manifest.json" />
    <link rel="apple-touch-icon" sizes="180x180" href="./icon-180.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="./icon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png" />

    <title>衣见 - AI穿搭助手</title>

    <!-- 启动画面样式 -->
    <style>
      body { background: #0f172a; margin: 0; }
      #splash {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        background: #0f172a; transition: opacity 0.3s;
      }
      #splash img { width: 80px; height: 80px; border-radius: 18px; margin-bottom: 16px; }
      #splash .name { color: #e2e8f0; font-size: 22px; font-weight: 700; font-family: system-ui, sans-serif; }
      #splash .sub { color: #64748b; font-size: 13px; margin-top: 6px; font-family: system-ui, sans-serif; }
      #splash.hide { opacity: 0; pointer-events: none; }
    </style>
  </head>
  <body>
    <!-- 启动画面 -->
    <div id="splash">
      <img src="./icon-192.png" alt="衣见" />
      <div class="name">衣见</div>
      <div class="sub">AI穿搭助手</div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- 注册Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js').catch(() => {});
        });
      }
      // 隐藏启动画面
      window.addEventListener('load', () => {
        setTimeout(() => {
          const splash = document.getElementById('splash');
          if (splash) { splash.classList.add('hide'); setTimeout(() => splash.remove(), 300); }
        }, 600);
      });
    </script>
  </body>
</html>
